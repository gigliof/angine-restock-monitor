name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? Skim the open issues first - someone may already have proposed it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or frustration behind the request.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Examples or references to similar tools are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you're currently using?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New notification channel (Discord, Pushover, Slack, ...)
        - Stock detection improvements
        - Cart automation
        - Configuration / CLI ergonomics
        - Logging / observability
        - Packaging / deployment (Docker, systemd, ...)
        - Documentation
        - Other
    validations:
      required: true
