version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      # Bundle dev tooling updates into one PR
      dev-tooling:
        patterns:
          - "eslint"
          - "@eslint/*"
          - "eslint-config-*"
          - "eslint-plugin-*"
          - "prettier"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
